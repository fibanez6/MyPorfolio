name: Tests

on: push

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
      - name: Install Modules
        run: npm ci
      - name: Run Build
        run: npm run build
      - name: Run Tests
        run: npm test
